# KABANEK CRM — Nginx reverse proxy
# Skopiuj do: /etc/nginx/sites-available/kabanek
# Aktywuj:    sudo ln -s /etc/nginx/sites-available/kabanek /etc/nginx/sites-enabled/
# Test:       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name crm.kabanek.pl;  # ← zmień na swoją domenę

    client_max_body_size 25M;  # dla uploadu dokumentów

    # Kabanek CRM — Klienci
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

